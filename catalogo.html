<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo | Grúas</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* 🔥 FONDO */
body{
  min-height:100vh;
  position:relative;
  color:white;
  overflow-x:hidden;
}

/* fondo elegante */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:url("https://res.cloudinary.com/deod0oalc/image/upload/5d02ef40-1642-4a3f-b3ea-05ee9ca98ddc_age4vr.jpg");
  background-size:cover;
  background-position:center;
  filter:brightness(0.35);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.85));
  z-index:-1;
}

/* 🔥 SLOGANS */
.slogan{
  position:fixed;
  top:90px;
  width:260px;
  font-size:14px;
  font-weight:700;
  color:#25D366;
  opacity:0.9;
  z-index:999;
  line-height:1.4;
}

.slogan.left{
  left:20px;
  text-align:left;
}

.slogan.right{
  right:20px;
  text-align:right;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:700;
  opacity:0.85;
}

nav a:hover{
  color:#25D366;
}

/* 🔥 HEADER */
.header{
  padding:80px 20px 30px;
  text-align:center;
  position:relative;
  z-index:2;
}

.header-card{
  display:inline-block;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  padding:30px 32px;
  border-radius:16px;
  max-width:750px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.header h1{
  font-size:42px;
  font-weight:900;
  margin-bottom:10px;
}

.header p{
  opacity:0.85;
  font-size:16px;
  color:#cbd5e1;
}

/* GRID */
.grid{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px 80px;

  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

/* TARJETAS */
.item{
  border-radius:14px;
  overflow:hidden;
  height:200px;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.03);
  border-color:rgba(37,211,102,0.5);
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:768px){
  .slogan{
    display:none; /* 🔥 ocultar en celular */
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }

  .item{
    height:220px;
  }
}

</style>
</head>

<body>

<!-- 🔥 SLOGANS -->
<div class="slogan left" id="sloganLeft"></div>
<div class="slogan right" id="sloganRight"></div>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<div class="header">
  <div class="header-card">
    <h1>Catálogo</h1>
    <p>Galería de equipos y maniobras</p>
  </div>
</div>

<section class="grid">

  <!-- FILA 1 -->
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/Gemini_Generated_Image_3zt7fk3zt7fk3zt7_kuaitf.png"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/6dab0765-8b3a-497b-9d3c-c81397096391_dz5yzg.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/9e4a9d3f-a5d8-4d66-80bd-86908a1adf54_agiwts.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/70dddf35-39d3-4891-a764-2997a45dddf2_orvzhk.jpg"></div>

  <!-- FILA 2 -->
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/08084e6f-ae2e-4300-a621-bfe6c7b55288_ss7txl.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/43dcb4ec-8245-41d1-9450-03e1a0432d89_o1z4ys.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/326a0fda-a150-413b-bc8e-5c8cfa88185a_g4uzaz.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/49456c19-8887-485c-8f07-63e73889eb71_omdwyn.jpg"></div>

  <!-- FILA 3 -->
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/Gruas_cigar_wapdc5.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/101a1d07-f038-488a-95d8-53c099dfd138_sssbxk.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/180f52fa-590b-4a5e-8633-8c1fc7b9c043_qn9cn5.jpg"></div>
  <div class="item"><img src="https://res.cloudinary.com/deod0oalc/image/upload/56b174f9-fffc-4923-9de6-758770da4054_fg3lgu.jpg"></div>

</section>

<script>
const slogans = [
"Equipos listos para cualquier desafío",
"Potencia y precisión en cada proyecto",
"Flota moderna para trabajos exigentes",
"Capacidad que marca la diferencia",
"Tecnología aplicada al izaje",
"Cada imagen respalda nuestra experiencia",
"Soluciones reales en cada proyecto",
"Confianza que se construye con resultados",
"Movemos grandes proyectos",
"Donde la maquinaria cobra vida",
"Tu proyecto empieza aquí",
"Calidad en cada maniobra"
];

let i = 0;

function cambiarSlogan(){
  document.getElementById("sloganLeft").textContent = slogans[i];
  document.getElementById("sloganRight").textContent = slogans[(i+1) % slogans.length];
  i = (i + 1) % slogans.length;
}

cambiarSlogan();
setInterval(cambiarSlogan, 7000);
</script>

</body>
</html>
