<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo | Grúas</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* 🔥 BASE */
body{
  min-height:100vh;
  position:relative;
  color:white;
  overflow-x:hidden;
}

/* =========================
   🔥 FONDO PRO (IMAGEN COMPLETA)
   ========================= */

/* capa BORROSA (relleno elegante) */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:url("https://res.cloudinary.com/deod0oalc/image/upload/5d02ef40-1642-4a3f-b3ea-05ee9ca98ddc_age4vr.jpg");
  background-size:cover;
  background-position:center;
  filter:blur(40px) brightness(0.4);
  transform:scale(1.2);

  z-index:-3;
}

/* imagen PRINCIPAL completa */
body::after{
  content:"";
  position:fixed;
  inset:0;

  background-image:url("https://res.cloudinary.com/deod0oalc/image/upload/5d02ef40-1642-4a3f-b3ea-05ee9ca98ddc_age4vr.jpg");
  background-size:contain; /* 👈 CLAVE (NO RECORTE) */
  background-position:center;
  background-repeat:no-repeat;

  z-index:-2;
}

/* overlay oscuro */
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.9));
  z-index:-1;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:700;
  opacity:0.85;
}

nav a:hover{
  color:#25D366;
}

/* HEADER (MISMO TAMAÑO QUE SERVICIOS) */
.header{
  text-align:center;
  padding:80px 20px 30px;
}

.header h1{
  font-size:42px;
  font-weight:900;
  margin-bottom:10px;
}

.header p{
  color:#cbd5e1;
  font-size:16px;
  opacity:0.85;
}

/* GRID */
.grid{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px 80px;

  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

/* TARJETAS */
.item{
  border-radius:14px;
  overflow:hidden;
  height:200px;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.03);
  border-color:rgba(37,211,102,0.5);
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }

  .item{
    height:220px;
  }
}

</style>
</head>

<body>

<div class="overlay"></div>

<nav>

  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

</div>
