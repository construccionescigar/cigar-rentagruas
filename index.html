<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas y Maniobras Nacionales</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body{
  background:#0b0f14;
  color:white;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
  color:white;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  opacity:0.85;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#25D366;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;

  background-image:
    linear-gradient(
      135deg,
      rgba(0,0,0,0.55),
      rgba(0,0,0,0.85)
    ),
    url('https://res.cloudinary.com/deod0oalc/image/upload/43dcb4ec-8245-41d1-9450-03e1a0432d89_o1z4ys.jpg');

  background-size:cover;
  background-position:center;
}

/* EFECTO DE PROFUNDIDAD */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(37,211,102,0.10), transparent 60%);
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* BADGE MÁS VIVO */
.badge{
  background:rgba(37, 211, 102, 0.18);
  border:1px solid rgba(37,211,102,0.45);
  padding:10px 16px;
  border-radius:50px;
  font-weight:700;
  font-size:14px;
  color:#25D366;
  box-shadow:0 0 20px rgba(37,211,102,0.15);
}

/* LOGO */
.hero-logo img{
  height:180px;
  max-width:90%;
  filter:drop-shadow(0 15px 30px rgba(0,0,0,0.7));
}

/* TITULO MÁS FUERTE */
h1{
  font-size:44px;
  font-weight:900;
  letter-spacing:1px;
}

.sub{
  font-size:18px;
  opacity:0.9;
  color:#cbd5e1;
  max-width:600px;
}

/* BOTONES MÁS “VENTA” */
.buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
}

.btn{
  padding:14px 22px;
  border-radius:10px;
  text-decoration:none;
  font-weight:800;
  font-size:15px;
  transition:0.3s;
}

/* PRIMARY MÁS BRILLANTE */
.btn.primary{
  background:#25D366;
  color:white;
  box-shadow:0 10px 25px rgba(37,211,102,0.25);
}

.btn.primary:hover{
  transform:translateY(-2px);
  background:#1ebe5d;
}

/* SECONDARY MÁS LIMPIO */
.btn.secondary{
  border:2px solid rgba(255,255,255,0.8);
  color:white;
}

.btn.secondary:hover{
  background:white;
  color:black;
}

/* WHATSAPP FLOAT MÁS VISIBLE */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  width:62px;
  height:62px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
  z-index:2000;
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){

  h1{
    font-size:30px;
  }

  .sub{
    font-size:15px;
  }

  .hero-logo img{
    height:140px;
  }

  nav{
    gap:10px;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="contacto.html">Contacto</a>
</nav>

<section class="hero">

  <div class="hero-content">

    <div class="badge">🚧 Renta de Grúas Industriales</div>

    <div class="hero-logo">
      <img src="https://res.cloudinary.com/deod0oalc/image/upload/LogoGruaPNG_xpqskn.png">
    </div>

    <h1>Grúas y Maniobras Nacionales</h1>

    <div class="sub">
      Soluciones profesionales en izaje, maniobras y transporte especializado
    </div>

    <div class="buttons">
      <a class="btn primary" href="contacto.html">Cotizar por WhatsApp</a>
      <a class="btn secondary" href="servicios.html">Ver servicios</a>
    </div>

  </div>

</section>

<a class="whatsapp" href="https://wa.me/5217771330689" target="_blank">
  💬
</a>

</body>
</html>
