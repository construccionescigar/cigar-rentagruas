<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas y Maniobras Nacionales CR</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body{
  background:#0b0f14;
  color:white;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
  color:white;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  opacity:0.85;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#25D366;
}

/* 🔥 SLOGANS ESQUINAS SUPERIORES */
.slogan{
  position:fixed;
  top:90px;
  font-size:13px;
  font-weight:600;
  color:#9ca3af;
  letter-spacing:1px;
  text-transform:uppercase;
  opacity:0;
  transition:opacity 0.6s ease;
  z-index:999;
  max-width:220px;
  pointer-events:none;
}

.slogan.left{
  left:20px;
  text-align:left;
}

.slogan.right{
  right:20px;
  text-align:right;
}

/* HERO */
.hero{
  min-height:100vh;
  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  background-color:#000;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:url('https://res.cloudinary.com/deod0oalc/image/upload/Gemini_Generated_Image_f8pghjf8pghjf8pg_typgu0.png');
  background-size:cover;
  background-position:50% 20%;
  background-repeat:no-repeat;

  transform:scale(1.08);
  filter:contrast(1.1) saturate(1.05) brightness(0.85);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;

  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.75)
  );
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:1000px;
  padding:40px 20px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}

.badge{
  background:rgba(37, 211, 102, 0.14);
  border:1px solid rgba(37,211,102,0.45);
  padding:10px 18px;
  border-radius:50px;
  font-weight:800;
  font-size:14px;
  color:#25D366;
}

.hero-logo img{
  height:300px;
  max-width:95%;
  filter:drop-shadow(0 15px 35px rgba(0,0,0,0.7));
}

.main-text{
  font-size:72px;
  font-weight:950;
  letter-spacing:1px;
  line-height:1.05;
}

.sub{
  font-size:18px;
  opacity:0.9;
  color:#cbd5e1;
}

.buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:15px 22px;
  border-radius:8px;
  text-decoration:none;
  font-weight:800;
  font-size:15px;
  transition:0.3s;
}

.btn.primary{
  background:#25D366;
  color:white;
}

.btn.primary:hover{
  background:#1ebe5d;
  transform:translateY(-2px);
}

.btn.secondary{
  border:2px solid white;
  color:white;
}

.btn.secondary:hover{
  background:white;
  color:black;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  width:62px;
  height:62px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  z-index:2000;
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){

  .main-text{
    font-size:38px;
  }

  .hero-logo img{
    height:180px;
  }

  .sub{
    font-size:15px;
  }

  .slogan{
    display:none;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Inicio</a>
  <a href="informacion.html">Información</a>
  <a href="servicios.html">Servicios</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<!-- 🔥 SLOGANS -->
<div class="slogan left" id="slogan-left"></div>
<div class="slogan right" id="slogan-right"></div>

<section class="hero">

  <div class="hero-content">

    <div class="badge">Renta de Grúas Industriales</div>

    <div class="hero-logo">
      <img src="https://res.cloudinary.com/deod0oalc/image/upload/LogoGruaPNG_xpqskn.png">
    </div>

    <div class="main-text">
      Grúas y Maniobras<br>Nacionales CR
    </div>

    <div class="sub">
      Soluciones profesionales en izaje, maniobras y transporte especializado
    </div>

    <div class="buttons">
      <a class="btn primary" href="contacto.html">Cotizar ahora</a>
      <a class="btn secondary" href="servicios.html">Ver servicios</a>
    </div>

  </div>

</section>

<a class="whatsapp" href="https://wa.me/5217771330689">
  💬
</a>

<!-- 🔥 SCRIPT SLOGANS -->
<script>

const slogans = [
  "Elevamos proyectos, no solo cargas",
  "Donde otros se detienen, nosotros levantamos",
  "Precisión y potencia en cada maniobra",
  "Tu proyecto en manos expertas",
  "Soluciones de izaje para grandes desafíos",
  "Ingeniería y fuerza trabajando para ti",
  "Especialistas en carga pesada y maniobras críticas",
  "Tecnología y experiencia en cada elevación",
  "Movemos lo que necesitas, cuando lo necesitas",
  "Seguridad, rapidez y eficiencia en cada servicio",
  "Tu aliado estratégico en proyectos industriales",
  "Resultados que se elevan contigo"
];

let index = 0;

const left = document.getElementById("slogan-left");
const right = document.getElementById("slogan-right");

function cambiar(){

  left.style.opacity = 0;
  right.style.opacity = 0;

  setTimeout(() => {
    index = (index + 1) % slogans.length;

    left.textContent = slogans[index];
    right.textContent = slogans[(index + 3) % slogans.length];

    left.style.opacity = 1;
    right.style.opacity = 1;

  }, 400);
}

left.textContent = slogans[0];
right.textContent = slogans[3];

left.style.opacity = 1;
right.style.opacity = 1;

setInterval(cambiar, 7000);

</script>

</body>
</html>
