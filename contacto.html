<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body{
  background:#0b0f14;
  color:white;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  padding:12px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
  color:white;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  opacity:0.85;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#25D366;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 30px;
}

.hero-logo img{
  height:170px;
  max-width:90%;
  margin-bottom:10px;
  filter:drop-shadow(0 10px 25px rgba(0,0,0,0.5));
}

.hero h1{
  font-size:42px;
  font-weight:800;
  margin-bottom:10px;
}

.hero p{
  opacity:0.8;
  font-size:16px;
}

/* BADGE */
.badge{
  display:inline-block;
  margin-top:15px;
  padding:10px 16px;
  border-radius:50px;
  background:rgba(37,211,102,0.12);
  border:1px solid rgba(37,211,102,0.4);
  color:#25D366;
  font-weight:600;
  font-size:14px;
}

/* CARD */
.card{
  max-width:420px;
  margin:40px auto;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:25px;
  text-align:center;
  backdrop-filter:blur(10px);
}

.card h2{
  margin-bottom:15px;
  font-size:20px;
}

/* BUTTONS */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
  transition:0.3s;
}

.wa{
  background:#25D366;
  color:white;
}

.wa:hover{
  background:#1ebe5d;
}

.call{
  background:#111827;
  color:white;
  border:1px solid rgba(255,255,255,0.15);
}

.mail{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
}

/* FLOAT WHATSAPP */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
}

/* RESPONSIVE */
@media(max-width:768px){

  nav{
    gap:10px;
  }

  .hero h1{
    font-size:28px;
  }

  .hero-logo img{
    height:130px;
  }

  .card{
    width:90%;
  }
}

</style>
</head>

  <p>Atención rápida para renta de grúas y maniobras industriales</p>
