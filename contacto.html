<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grúas | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
}

/* HEADER */
header{
  background:#000;
  padding:15px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
}

nav a:hover{
  opacity:0.7;
}

/* HERO */
.hero{
  background:#000;
  color:white;
  text-align:center;
  padding:60px 20px;
}

.hero-logo img{
  height:240px;
  margin-bottom:15px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  margin-top:10px;
  opacity:0.8;
}

/* CONTENEDOR */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:50px 20px;
  position:relative;
  overflow:hidden;
  min-height:450px;
}

/* 🔥 COLLAGE REAL */
.bg{
  position:absolute;
  inset:0;
  z-index:0;
}

/* IMAGEN 1 */
.bg1{
  position:absolute;
  top:0;
  left:0;
  width:55%;
  height:60%;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/9e4a9d3f-a5d8-4d66-80bd-86908a1adf54_agiwts.jpg')
  center/cover no-repeat;
}

/* IMAGEN 2 */
.bg2{
  position:absolute;
  top:0;
  right:0;
  width:55%;
  height:60%;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/70dddf35-39d3-4891-a764-2997a45dddf2_orvzhk.jpg')
  center/cover no-repeat;
}

/* IMAGEN 3 */
.bg3{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:55%;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/08084e6f-ae2e-4300-a621-bfe6c7b55288_ss7txl.jpg')
  center/cover no-repeat;
}

/* OSCURECER FONDO */
.container::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:1;
}

/* CARD */
.card{
  background:#e5e5e5;
  padding:40px 25px;
  border-radius:15px;
  width:100%;
  max-width:450px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  position:relative;
  z-index:2;
}

/* TEXTOS */
.card h2{
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  margin-bottom:20px;
}

/* BOTONES */
.btn{
  display:block;
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

/* WHATSAPP */
.wa{
  background:#25D366;
  color:white;
}

.wa:hover{
  background:#1ebe5d;
  transform:scale(1.03);
}

/* LLAMAR */
.call{
  background:black;
  color:white;
}

.call:hover{
  transform:scale(1.03);
}

/* MAIL */
.mail{
  background:#cfcfcf;
  color:black;
}

.mail:hover{
  background:#bdbdbd;
  transform:scale(1.03);
}

/* BOTÓN FLOTANTE */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
  transition:0.3s;
}

.whatsapp-float:hover{
  transform:scale(1.1);
}

</style>
</head>

<body>

<header>
<nav>

<section class="hero">

  <div class="hero-logo">

  </div>

  <h1>Contacto</h1>
  <p>Respuesta rápida para servicios de grúas</p>

</section>

<div class="container">

  <!-- 🔥 COLLAGE -->
  <div class="bg">
    <div class="bg1"></div>
    <div class="bg2"></div>
    <div class="bg3"></div>
  </div>

  <!-- CARD -->
  <div class="card">

    <h2>Comuníquese con nosotros</h2>
    <p>Servicio de grúas eficaz y disponible</p>

    <a class="btn wa" href="https://wa.me/5217771330689" target="_blank">
      💬 WhatsApp
    </a>

    <a class="btn call" href="tel:+527771330689">
      📞 Llamar ahora
    </a>

    <a class="btn mail" target="_blank"
    href="https://mail.google.com/mail/?view=cm&fs=1&to=gruascr21@gmail.com">
      ✉️ Enviar correo
    </a>

  </div>

</div>

<a href="https://wa.me/5217771330689" class="whatsapp-float" target="_blank">
  💬
</a>

</body>
</html>
